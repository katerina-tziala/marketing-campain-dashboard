<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1440"
  height="980"
  viewBox="0 0 1440 980"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Marketing Intelligence Dashboard — Software Architecture</title>
  <desc id="desc">
    System architecture diagram showing CSV import, validation, deterministic portfolio analytics,
    campaign performance exploration, AI connection, prompt generation, runtime validation, caching,
    and external AI providers.
  </desc>

  <defs>
    <linearGradient id="headerGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="52%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>

    <filter id="shadow" x="-6%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>

    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="9"
      refY="5"
      markerWidth="9"
      markerHeight="9"
      orient="auto-start-reverse"
    >
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>

    <style>
      .background {
        fill: #f8fafc;
      }

      .title {
        fill: #0f172a;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 34px;
        font-weight: 800;
      }

      .subtitle,
      .caption {
        fill: #475569;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
      }

      .subtitle {
        font-size: 18px;
        font-weight: 600;
      }

      .section-label {
        fill: #334155;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .node {
        fill: #ffffff;
        stroke: #cbd5e1;
        stroke-width: 1.5;
        filter: url("#shadow");
      }

      .node-primary {
        fill: #eff6ff;
        stroke: #60a5fa;
      }

      .node-domain {
        fill: #ecfdf5;
        stroke: #34d399;
      }

      .node-ai {
        fill: #f5f3ff;
        stroke: #a78bfa;
      }

      .node-bridge {
        fill: #eef2ff;
        stroke: #7c3aed;
        stroke-width: 2.5;
      }

      .node-provider {
        fill: #fff7ed;
        stroke: #fb923c;
      }

      .node-safety {
        fill: #fef2f2;
        stroke: #f87171;
      }

      .node-title {
        fill: #0f172a;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 18px;
        font-weight: 800;
      }

      .node-text {
        fill: #475569;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
      }

      .lane {
        fill: #ffffff;
        stroke: #e2e8f0;
        stroke-width: 1;
      }

      .arrow {
        fill: none;
        stroke: #475569;
        stroke-width: 2;
        marker-end: url("#arrow");
      }

      .arrow-muted {
        fill: none;
        stroke: #94a3b8;
        stroke-dasharray: 7 7;
        stroke-width: 2;
        marker-end: url("#arrow");
      }

      .boundary {
        fill: none;
        stroke: #94a3b8;
        stroke-dasharray: 9 8;
        stroke-width: 1.5;
      }

      .runtime-boundary {
        fill: none;
        stroke: #a78bfa;
        stroke-dasharray: 9 8;
        stroke-width: 1.4;
      }

      .tag {
        fill: #e2e8f0;
      }

      .tag-text {
        fill: #334155;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        text-anchor: middle;
      }
    </style>
  </defs>

  <rect class="background" width="1440" height="980" />

  <rect x="0" y="0" width="1440" height="120" fill="url(#headerGradient)" />
  <text class="title" x="64" y="58" fill="#ffffff">
    Marketing Intelligence Dashboard — Software Architecture
  </text>
  <text class="subtitle" x="64" y="88" fill="#dbeafe">
    End-to-end flow from validated campaign data to portfolio analytics and AI-assisted recommendations
  </text>

  <rect class="lane" x="48" y="152" width="1344" height="224" rx="18" />
  <text class="section-label" x="72" y="190">Data ingestion and deterministic analytics</text>

  <rect class="lane" x="48" y="408" width="1344" height="220" rx="18" />
  <text class="section-label" x="72" y="446">User-facing exploration</text>

  <rect class="lane" x="48" y="660" width="1344" height="250" rx="18" />
  <text class="section-label" x="72" y="694">AI orchestration</text>
  <text class="section-label" x="72" y="716">&amp; external providers</text>

  <g transform="translate(76 220)">
    <rect class="node node-primary" width="230" height="108" rx="14" />
    <text class="node-title" x="22" y="34">CSV Import</text>
    <text class="node-text" x="22" y="62">Browser-side campaign</text>
    <text class="node-text" x="22" y="84">performance upload</text>
  </g>

  <g transform="translate(368 220)">
    <rect class="node node-primary" width="250" height="108" rx="14" />
    <text class="node-title" x="22" y="34">Validation Pipeline</text>
    <text class="node-text" x="22" y="62">File, headers, rows, metrics,</text>
    <text class="node-text" x="22" y="84">funnel rules, duplicates</text>
  </g>

  <g transform="translate(680 220)">
    <rect class="node node-domain" width="260" height="108" rx="14" />
    <text class="node-title" x="22" y="34">Portfolio State</text>
    <text class="node-text" x="22" y="62">Accepted rows become</text>
    <text class="node-text" x="22" y="84">portfolio input and channel map</text>
  </g>

  <g transform="translate(1002 220)">
    <rect class="node node-domain" width="290" height="108" rx="14" />
    <text class="node-title" x="22" y="34">Domain Analytics</text>
    <text class="node-text" x="22" y="62">Metrics, benchmarks, rankings,</text>
    <text class="node-text" x="22" y="84">classifications, signals</text>
  </g>

  <path class="arrow" d="M 306 274 H 360" />
  <path class="arrow" d="M 618 274 H 672" />
  <path class="arrow" d="M 940 274 H 994" />

  <g transform="translate(112 478)">
    <rect class="node" width="290" height="112" rx="14" />
    <text class="node-title" x="22" y="34">Campaign Performance UI</text>
    <text class="node-text" x="22" y="62">KPIs, charts, sortable table,</text>
    <text class="node-text" x="22" y="84">channel-scoped exploration</text>
  </g>

  <g transform="translate(474 478)">
    <rect class="node" width="292" height="112" rx="14" />
    <text class="node-title" x="22" y="34">Feature State Coordination</text>
    <text class="node-text" x="22" y="62">Syncs portfolio, filters,</text>
    <text class="node-text" x="22" y="84">and portfolio analysis context</text>
  </g>

  <g transform="translate(838 478)">
    <rect class="node node-bridge" width="320" height="112" rx="14" />
    <text class="node-title" x="22" y="34">Portfolio Analysis Context</text>
    <text class="node-text" x="22" y="62">Derived analytics, filters,</text>
    <text class="node-text" x="22" y="84">business context, signals</text>
  </g>

  <path class="arrow" d="M 1132 328 V 392 H 336 V 470" />
  <path class="arrow" d="M 402 534 H 466" />
  <path class="arrow" d="M 766 534 H 830" />

  <rect class="runtime-boundary" x="64" y="700.5" width="948" height="195.5" rx="18" />
  <g transform="translate(868 856)">
    <rect class="tag" width="132" height="28" rx="14" />
    <text class="tag-text" x="66" y="18">AI Runtime Layer</text>
  </g>

  <g transform="translate(86 732)">
    <rect class="node node-ai" width="250" height="118" rx="14" />
    <text class="node-title" x="22" y="34">Provider Normalization</text>
    <text class="node-text" x="22" y="62">API key, model discovery,</text>
    <text class="node-text" x="22" y="84">ranked selection</text>
  </g>

  <g transform="translate(398 732)">
    <rect class="node node-ai" width="260" height="118" rx="14" />
    <text class="node-title" x="22" y="34">Prompt Generation</text>
    <text class="node-text" x="22" y="62">Versioned model evaluation,</text>
    <text class="node-text" x="22" y="84">summary, optimization prompts</text>
  </g>

  <g transform="translate(720 732)">
    <rect class="node node-safety" width="274" height="118" rx="14" />
    <text class="node-title" x="22" y="34">Runtime Safeguards</text>
    <text class="node-text" x="22" y="62">Response validation, cache keys,</text>
    <text class="node-text" x="22" y="84">cooldowns, cancellation, fallback</text>
  </g>

  <rect class="boundary" x="1032" y="670" width="344" height="230" rx="18" />

  <g transform="translate(1090 732)">
    <rect class="node node-provider" width="250" height="118" rx="14" />
    <text class="node-title" x="22" y="34">External AI Providers</text>
    <text class="node-text" x="22" y="62">Google Gemini</text>
    <text class="node-text" x="22" y="84">Groq</text>
  </g>

  <g transform="translate(1232 860)">
    <rect class="tag" width="132" height="28" rx="14" />
    <text class="tag-text" x="66" y="18">External boundary</text>
  </g>

  <path class="arrow" d="M 998 590 V 642 H 300 V 724" />
  <path class="arrow" d="M 336 791 H 390" />
  <path class="arrow" d="M 658 791 H 712" />
  <path class="arrow" d="M 994 791 H 1082" />
  <path class="arrow" d="M 1215 732 V 534 H 1166" />

  <text class="caption" x="74" y="938">
    Principle: deterministic analytics own source-of-truth calculations; AI consumes derived analytics and assists interpretation
  </text>
</svg>
