name: Release and Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.2.0"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-and-deploy
  cancel-in-progress: false

jobs:
  create-release:
    name: Check and create release
    if: github.actor == 'katerina-tziala'
    runs-on: ubuntu-latest

    outputs:
      release-tag: ${{ steps.release.outputs.release_tag }}

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must be valid semver, for example 1.2.0."
            exit 1
          fi

          if git rev-parse "v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Tag v$RELEASE_VERSION already exists."
            exit 1
          fi

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump app version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: npm version "$RELEASE_VERSION" --no-git-tag-version

      - name: Commit and tag release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git add package.json package-lock.json
          git commit -m "Release v$RELEASE_VERSION"
          git tag "v$RELEASE_VERSION"
          git push origin "HEAD:$DEFAULT_BRANCH"
          git push origin "v$RELEASE_VERSION"

      - name: Create GitHub release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$RELEASE_VERSION" --title "v$RELEASE_VERSION" --generate-notes
          echo "release_tag=v$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

  deploy-release:
    name: Review and deploy release
    needs: create-release
    if: github.actor == 'katerina-tziala'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      VITE_DEV_MODE: "false"
      VITE_DEV_SEED_MOCK_CAMPAIGNS: "false"
      VITE_DEV_AI_ANALYSIS_CYCLE: "false"
      VITE_DEV_AI_CONNECTION_CYCLE: "false"

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.create-release.outputs.release-tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build app
        run: npm run build -- --base "/${{ github.event.repository.name }}/"

      - name: Write deployment metadata
        env:
          RELEASE_TAG: ${{ needs.create-release.outputs.release-tag }}
        run: |
          DEPLOYED_SHA="$(git rev-parse HEAD)" node -e 'import { readFileSync, writeFileSync } from "node:fs"; const pkg = JSON.parse(readFileSync("package.json", "utf8")); const metadata = { version: pkg.version, tag: process.env.RELEASE_TAG, sha: process.env.DEPLOYED_SHA, deployedAt: new Date().toISOString() }; writeFileSync("dist/version.json", JSON.stringify(metadata, null, 2) + "\n");'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add deployment summary
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          RELEASE_TAG: ${{ needs.create-release.outputs.release-tag }}
        run: |
          {
            echo "### Deployed release"
            echo
            echo "- Tag: $RELEASE_TAG"
            echo "- URL: $PAGE_URL"
            echo "- Metadata: ${PAGE_URL}version.json"
          } >> "$GITHUB_STEP_SUMMARY"
