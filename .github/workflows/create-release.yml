name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.2.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: create-release
  cancel-in-progress: false

jobs:
  create-release:
    name: Check and create release
    if: github.actor == 'katerina-tziala'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must be valid semver, for example 1.2.0."
            exit 1
          fi

          if git rev-parse "v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Tag v$RELEASE_VERSION already exists."
            exit 1
          fi

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump app version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: npm version "$RELEASE_VERSION" --no-git-tag-version

      - name: Commit and tag release
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git add package.json package-lock.json
          git commit -m "Release v$RELEASE_VERSION"
          git tag "v$RELEASE_VERSION"
          git push origin main
          git push origin "v$RELEASE_VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: gh release create "v$RELEASE_VERSION" --title "v$RELEASE_VERSION" --generate-notes
