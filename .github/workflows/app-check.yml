name: App Check

on:
  push:
    paths:
      - 'app/**'
      - '.github/workflows/app-check.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/app-check.yml'

jobs:
  app-check:
    name: Typecheck, lint, and format
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check
